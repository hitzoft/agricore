spring.application.name=AgricolaApi
server.port=8081

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/celestial_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.url=jdbc:postgresql://127.0.0.1:5433/celestial_db
spring.flyway.user=postgres
spring.flyway.password=postgres

# Envers Configuration (Auditoría Silenciosa requerida)
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_auditoria

# CORS Configuration
cors.allowed.origins=http://localhost:5173
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS

# Server Configuration

